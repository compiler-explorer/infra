compilers:
  sfpi:
    type: tarballs
    compression: xz
    dir: sfpi-{{name}}
    untar_dir: sfpi
    check_exe: compiler/bin/riscv-tt-elf-g++ --version
    url: https://github.com/tenstorrent/sfpi/releases/download/{{name}}/sfpi_{{name}}_x86_64_debian.txz
    targets:
      - 7.54.0
      - 7.55.0
