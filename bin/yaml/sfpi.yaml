compilers:
  sfpi:
    type: tarballs
    compression: xz
    dir: sfpi-{{name}}
    untar_dir: sfpi
    check_exe: compiler/libexec/gcc/riscv-tt-elf/{{gcc_version}}/cc1plus --version
    url: https://github.com/tenstorrent/sfpi/releases/download/{{name}}/sfpi_{{name}}_x86_64_debian.txz
    depends:
      - tools/tt-metal-headers {{tt_metal_version}}
      - tools/patchelf 0.15.0
    after_stage_script:
      - "{{yaml_dir}}/sfpi/prepare-headers.sh {{name}} %DEP0% sfpi"
      # The release's cc1plus requires libmpfr.so.6 and libmpc.so.3, so keep those runtimes local
      # to SFPI instead of adding a package to every CE instance.
      - curl -sLO https://archive.ubuntu.com/ubuntu/pool/main/m/mpfr4/{{mpfr_package}}
      - curl -sLO https://archive.ubuntu.com/ubuntu/pool/main/m/mpclib3/{{mpc_package}}
      - dpkg-deb -x {{mpfr_package}} sfpi-mpfr
      - dpkg-deb -x {{mpc_package}} sfpi-mpc
      - mkdir -p sfpi/compiler/libexec/gcc/riscv-tt-elf/{{gcc_version}}/ce-runtime
      - cp -a sfpi-mpfr/usr/lib/x86_64-linux-gnu/libmpfr.so.{{mpfr_so_version}}* sfpi/compiler/libexec/gcc/riscv-tt-elf/{{gcc_version}}/ce-runtime/
      - cp -a sfpi-mpc/usr/lib/x86_64-linux-gnu/libmpc.so.{{mpc_so_version}}* sfpi/compiler/libexec/gcc/riscv-tt-elf/{{gcc_version}}/ce-runtime/
      - rm -rf {{mpfr_package}} {{mpc_package}} sfpi-mpfr sfpi-mpc
      - "%DEP1%/bin/patchelf --add-rpath '$ORIGIN/ce-runtime' sfpi/compiler/libexec/gcc/riscv-tt-elf/{{gcc_version}}/cc1plus"
    targets:
      - name: 7.55.0
        gcc_version: 15.1.0
        tt_metal_version: v0.71.2
        mpfr_package: libmpfr6_4.2.1-1build1_amd64.deb
        mpfr_so_version: 6
        mpc_package: libmpc3_1.3.1-1build1_amd64.deb
        mpc_so_version: 3
