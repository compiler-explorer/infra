compilers:
  sfpi:
    type: s3tarballs
    compression: xz
    dir: sfpi-{{name}}
    check_exe: compiler/libexec/gcc/riscv-tt-elf/{{gcc_version}}/cc1plus --version
    depends:
      - tools/tt-metal-headers {{tt_metal_version}}
    after_stage_script:
      - "{{yaml_dir}}/sfpi/prepare-headers.sh {{name}} %DEP0% sfpi-{{name}}"
    targets:
      - name: 7.55.0
        gcc_version: 15.1.0
        tt_metal_version: v0.71.2
